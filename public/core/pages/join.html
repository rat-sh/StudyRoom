<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StudyRoom — Join Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/core/css/base.css"/>
<link rel="stylesheet" href="/core/css/auth.css"/>
</head>
<body>
<div class="auth-page">
  <button onclick="toggleTheme()" style="position:absolute;top:20px;right:20px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;width:40px;height:40px;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);" title="Toggle Theme">
    <i data-lucide="moon" id="theme-icon" style="width:20px;height:20px"></i>
  </button>
  <div class="auth-card">
    <div class="auth-logo" onclick="goHome()" title="Go to home" style="cursor:pointer">
      <div class="auth-logo-icon"><i data-lucide="book-open"></i></div>
      StudyRoom
    </div>
    <h1>Join a room</h1>
    <p class="sub">Enter the room code and PIN to join</p>
    <div id="err" class="error-msg hidden"><i data-lucide="alert-circle" style="width:16px;height:16px"></i><span id="err-text" style="margin-left:4px"></span></div>
    <div class="field"><label>Your name</label><input type="text" id="guestName" placeholder="Your name"/></div>
    <div class="field"><label>Room code</label><input type="text" id="code" placeholder="ABC123" maxlength="6" style="font-family:var(--mono);font-size:18px;letter-spacing:0.12em;font-weight:700;text-transform:uppercase;text-align:center"/></div>
    <div class="field"><label>Room PIN</label><input type="text" id="pin" placeholder="0000" maxlength="4" style="font-family:var(--mono);font-size:22px;letter-spacing:0.2em;font-weight:700;text-align:center" inputmode="numeric"/></div>
    <button class="btn-primary" id="btn" onclick="doJoin()">Join Room →</button>
    <div class="auth-divider"><span>or</span></div>
    <button class="btn-outline" onclick="window.location.href='/lobby'" style="margin-bottom:8px">
      <i data-lucide="globe" style="width:16px;height:16px"></i> Browse Public Rooms
    </button>
    <div class="auth-switch"><a href="/">← Back to login</a></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="/core/js/api.js"></script>
<script src="/core/js/join.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>lucide.createIcons();</script>
</body>
</html>
