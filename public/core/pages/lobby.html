<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StudyRoom — Public Lobby</title>
<meta name="description" content="Browse live public study rooms. Find your focus zone."/>
<script>(function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('sr_theme') || 'light'); })();</script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/core/css/themes.css"/>
<link rel="stylesheet" href="/core/css/base.css"/>
<link rel="stylesheet" href="/core/css/components.css"/>
<link rel="stylesheet" href="/core/css/lobby.css"/>
</head>
<body>
<!-- NAV -->
<nav class="lobby-nav">
  <a class="lobby-logo" href="/dashboard">📚 StudyRoom</a>
  <div class="lobby-nav-right">
    <button class="lobby-theme-btn" id="theme-picker-btn" onclick="toggleThemePicker()" aria-label="Choose theme">🎨</button>
    <a href="/dashboard" class="nav-btn-dash">Dashboard</a>
  </div>
</nav>

<!-- HERO -->
<section class="lobby-hero">
  <div class="hero-inner">
    <h1 class="hero-title">Find your <span class="hero-typewriter" id="hero-tw">study squad</span><span class="hero-cursor">|</span></h1>
    <p class="hero-sub">Live public rooms — join instantly, no PIN needed</p>
    <div class="lobby-search-wrap">
      <input type="text" id="search-input" class="lobby-search" placeholder="Search by name or topic…" oninput="filterRooms()"/>
    </div>
  </div>
</section>

<!-- TOPICS FILTER -->
<div class="topics-bar" id="topics-bar">
  <button class="topic-chip active" onclick="filterByTopic('', this)">All</button>
  <button class="topic-chip" onclick="filterByTopic('Math', this)">Math</button>
  <button class="topic-chip" onclick="filterByTopic('Physics', this)">Physics</button>
  <button class="topic-chip" onclick="filterByTopic('Chemistry', this)">Chemistry</button>
  <button class="topic-chip" onclick="filterByTopic('Biology', this)">Biology</button>
  <button class="topic-chip" onclick="filterByTopic('Computer Science', this)">CS</button>
  <button class="topic-chip" onclick="filterByTopic('English', this)">English</button>
  <button class="topic-chip" onclick="filterByTopic('History', this)">History</button>
  <button class="topic-chip" onclick="filterByTopic('Economics', this)">Economics</button>
  <button class="topic-chip" onclick="filterByTopic('General', this)">General</button>
</div>

<!-- ROOMS GRID -->
<div class="lobby-main">
  <div class="lobby-grid" id="lobby-grid">
    <div class="skeleton" style="height:160px;border-radius:var(--radius)"></div>
    <div class="skeleton" style="height:140px;border-radius:var(--radius)"></div>
    <div class="skeleton" style="height:180px;border-radius:var(--radius)"></div>
    <div class="skeleton" style="height:150px;border-radius:var(--radius)"></div>
    <div class="skeleton" style="height:160px;border-radius:var(--radius)"></div>
    <div class="skeleton" style="height:145px;border-radius:var(--radius)"></div>
  </div>
</div>

<!-- JOIN MODAL -->
<div class="modal-overlay" id="modal-join">
  <div class="modal">
    <h2>🌐 Join Public Room</h2>
    <p class="sub" id="join-room-desc">Joining a public room</p>
    <div id="join-err" class="error-msg-sm hidden"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-go" id="join-confirm-btn" onclick="confirmJoin()">Join Now →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="/socket.io/socket.io.js"></script>
<script src="/core/js/api.js"></script>
<script src="/core/js/theme.js"></script>
<script src="/core/js/lobby.js"></script>
</body>
</html>
